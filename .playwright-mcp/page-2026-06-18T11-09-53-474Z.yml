                - paragraph [ref=e828]: "If the user approves your application, they are redirected to your redirect URI with an authorization code:"
                - generic [ref=e829]:
                  - generic [ref=e830]:
                    - img [ref=e832]
                    - button "Copy code" [ref=e835]:
                      - img [ref=e836]
                  - button "Click to copy code" [ref=e838]:
                    - img [ref=e840]
                - paragraph [ref=e842]:
                  - text: The code is short-lived and single-use. Exchange it for tokens immediately. If the user denies access, the redirect includes an
                  - code [ref=e843]: error
                  - text: parameter instead.
                - generic [ref=e844]:
                  - generic [ref=e845]:
                    - img [ref=e847]
                    - button "Copy code" [ref=e850]:
