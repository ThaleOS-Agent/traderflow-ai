                  - button "Click to copy code" [ref=e930]:
                    - img [ref=e932]
                - heading "Refreshing tokens Copy link to this section" [level=3] [ref=e934]:
                  - link "Refreshing tokens" [ref=e935] [cursor=pointer]:
                    - /url: "#refreshing-tokens"
                  - button "Copy link to this section" [ref=e936] [cursor=pointer]:
                    - img [ref=e937]
                - paragraph [ref=e939]: "When your access token expires (or is about to), exchange the refresh token for a new access token:"
                - generic [ref=e940]:
                  - generic [ref=e941]:
                    - img [ref=e943]
                    - button "Copy code" [ref=e946]:
                      - img [ref=e947]
                  - button "Click to copy code" [ref=e949]:
                    - img [ref=e951]
                - generic [ref=e953]:
                  - generic [ref=e954]:
                    - img [ref=e956]
                    - button "Copy code" [ref=e959]:
                      - img [ref=e960]
                  - button "Click to copy code" [ref=e962]:
                    - img [ref=e964]
                - paragraph [ref=e966]:
                  - text: Refresh tokens are rotated for security. The response includes a
                  - code [ref=e967]: refresh_token
                  - text: field that may initially contain the same value, but will eventually return a new token. Always store and use the refresh token from the most recent response.
                  - strong [ref=e968]: Using an old, rotated token will fail, and the user would need to re-authenticate.
                  - text: The new refresh token has a fresh one-year lifetime from the time of issuance.
                - alert [ref=e969]:
                  - img [ref=e971]
                  - paragraph [ref=e974]: Each user authorization can have a maximum of 100 refresh tokens. If you exceed this limit, the oldest tokens are revoked automatically.
                - heading "ID tokens Copy link to this section" [level=2] [ref=e975]:
                  - link "ID tokens" [ref=e976] [cursor=pointer]:
                    - /url: "#id-tokens"
                  - button "Copy link to this section" [ref=e977] [cursor=pointer]:
                    - img [ref=e978]
                - paragraph [ref=e980]: ID tokens are JSON Web Tokens (JWTs). Unlike access tokens, which are opaque and meant for API authorization, ID tokens are designed to be parsed and validated by your application to confirm who authenticated.
                - heading "Claims Copy link to this section" [level=3] [ref=e981]:
