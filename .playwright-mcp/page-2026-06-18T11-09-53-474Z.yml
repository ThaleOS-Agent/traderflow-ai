                    - /url: "#claims"
                  - button "Copy link to this section" [ref=e983] [cursor=pointer]:
                    - img [ref=e984]
                - paragraph [ref=e986]:
                  - text: The claims are not present in the ID token, but can be obtained by calling the
                  - code [ref=e987]: /oauth/me
                  - text: endpoint.
