                  - button "Click to copy code" [ref=e867]:
                    - img [ref=e869]
                - heading "Access tokens Copy link to this section" [level=2] [ref=e871]:
                  - link "Access tokens" [ref=e872] [cursor=pointer]:
                    - /url: "#access-tokens"
                  - button "Copy link to this section" [ref=e873] [cursor=pointer]:
                    - img [ref=e874]
                - paragraph [ref=e876]:
                  - text: Access tokens authenticate your application's requests to Railway's API. When you call the
                  - link "Public API" [ref=e877] [cursor=pointer]:
                    - /url: /integrations/api
                  - text: ", include the access token in the Authorization header:"
                - generic [ref=e878]:
                  - generic [ref=e879]:
                    - img [ref=e881]
                    - button "Copy code" [ref=e884]:
                      - img [ref=e885]
                  - button "Click to copy code" [ref=e887]:
                    - img [ref=e889]
                - heading "Refresh tokens Copy link to this section" [level=2] [ref=e891]:
                  - link "Refresh tokens" [ref=e892] [cursor=pointer]:
                    - /url: "#refresh-tokens"
                  - button "Copy link to this section" [ref=e893] [cursor=pointer]:
                    - img [ref=e894]
                - paragraph [ref=e896]: Access tokens expire after one hour. For applications that need longer-lived access (background jobs, scheduled tasks, or simply avoiding frequent re-authentication) refresh tokens provide a way to obtain new access tokens without user interaction.
                - heading "Obtaining refresh tokens Copy link to this section" [level=3] [ref=e897]:
                  - link "Obtaining refresh tokens" [ref=e898] [cursor=pointer]:
                    - /url: "#obtaining-refresh-tokens"
                  - button "Copy link to this section" [ref=e899] [cursor=pointer]:
                    - img [ref=e900]
                - paragraph [ref=e902]:
                  - text: To receive a refresh token, your authorization request must include both the
                  - code [ref=e903]: offline_access
                  - text: scope and the
                  - code [ref=e904]: prompt=consent
                  - text: "parameter:"
                - generic [ref=e905]:
                  - generic [ref=e906]:
                    - img [ref=e908]
                    - button "Copy code" [ref=e911]:
                      - img [ref=e912]
                  - button "Click to copy code" [ref=e914]:
                    - img [ref=e916]
                - paragraph [ref=e918]:
                  - text: The
                  - code [ref=e919]: prompt=consent
                  - text: ensures the user sees the consent screen, which is required for granting offline access. Without it, returning users might skip consent through automatic approval, and no refresh token would be issued.
                - paragraph [ref=e920]: "Response:"
                - generic [ref=e921]:
                  - generic [ref=e922]:
                    - img [ref=e924]
                    - button "Copy code" [ref=e927]:
