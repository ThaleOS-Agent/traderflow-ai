version: '3.9'

services:
  mongodb:
    image: mongo:7-jammy
    container_name: traderflow-mongodb
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all", "--dbpath", "/data/db"]
    stop_grace_period: 60s
    volumes:
      - ${MONGODB_DATA_DIR:-./.data/mongodb}:/data/db
      - ${MONGODB_CONFIG_DIR:-./.data/mongodb-config}:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: tradeflow
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/tradeflow
      # REQUIRED: set a real secret before deploying
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
