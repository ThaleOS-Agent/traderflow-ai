name: Frontend Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 22
      uses: actions/setup-node@v5
      with:
        node-version: 22
        cache: npm

    - name: Build
      run: |
        npm ci
        npm run build
